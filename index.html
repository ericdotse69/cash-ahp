<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASHFLOW</title>
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Cashflow%22,%22short_name%22:%22Cashflow%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#0f172a%22,%22theme_color%22:%22#38bdf8%22}">
    <meta name="theme-color" content="#38bdf8">

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; 
            --primary: #38bdf8; --income: #22c55e; --expense: #f43f5e; --border: #334155;
        }
        * { box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; }
        
        .dashboard { 
            background: var(--card-bg); padding: 25px; border: 2px solid var(--border);
            border-radius: 0px; box-shadow: 8px 8px 0px rgba(0,0,0,0.3); margin-bottom: 25px; 
        }
        h2 { text-transform: uppercase; letter-spacing: 3px; border-bottom: 2px solid var(--primary); display: inline-block; padding-bottom: 5px; }
        .summary { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        .summary div { flex: 1; text-align: left; padding: 15px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        
        .progress-container { background: #334155; height: 10px; margin-top: 20px; }
        #progress-bar { background: var(--primary); height: 100%; width: 0%; transition: 0.5s; }

        form, .history-container { 
            background: var(--card-bg); padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; 
        }

        .form-control { margin-bottom: 15px; }
        label { font-size: 0.8rem; color: var(--primary); text-transform: uppercase; font-weight: bold; }
        input, select { 
            width: 100%; padding: 12px; margin-top: 5px; background: #0f172a; 
            border: 1px solid var(--border); color: white; font-size: 14px; outline: none;
        }
        
        button { 
            width: 100%; padding: 15px; border: none; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; 
        }
        .btn-add { background: var(--primary); color: #000; }
        .btn-export { background: transparent; color: var(--primary); border: 1px solid var(--primary); margin-top: 20px; }

        .list { list-style: none; padding: 0; }
        .list li { 
            background: #1e293b; border: 1px solid var(--border); padding: 15px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; 
        }
        .details { display: flex; align-items: center; gap: 15px; }
        .icon-box { font-size: 24px; filter: grayscale(1); }
        .amt { font-weight: bold; font-size: 1.1rem; }
        .date-text { font-size: 0.65rem; color: #94a3b8; display: block; }
        .delete-btn { background: transparent; color: #475569; border: none; font-size: 18px; cursor: pointer; padding: 0 10px; }
        .status-badge { font-size: 0.7rem; padding: 4px 8px; background: #334155; color: var(--primary); display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>CASHFLOW</h2>
    
    <div class="dashboard">
        <div id="view-indicator" class="status-badge">SYSTEM VIEW: ALL-TIME</div>
        <label>TOTAL ASSETS</label>
        <h1 id="balance" style="font-size: 2.5rem; margin: 10px 0;">$0.00</h1>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div class="summary">
            <div><label>INFLOW</label><p id="money-plus" style="color:var(--income); margin: 5px 0;">+$0.00</p></div>
            <div><label>OUTFLOW</label><p id="money-minus" style="color:var(--expense); margin: 5px 0;">-$0.00</p></div>
        </div>
    </div>

    <form id="form">
        <div class="form-control"><label>Operation Name</label><input type="text" id="text" placeholder="Description" required></div>
        <div class="form-control"><label>Value</label><input type="number" id="amount" step="0.01" required></div>
        <div class="form-control">
            <label>Classification</label>
            <select id="category">
                <option value="General">📦 GENERAL</option>
                <option value="Food">🍔 SUPPLY</option>
                <option value="Salary">💰 REVENUE</option>
                <option value="Transport">🚗 LOGISTICS</option>
                <option value="Rent">🏠 INFRASTRUCTURE</option>
                <option value="Entertainment">🎬 RECREATION</option>
                <option value="Shopping">🛍️ ACQUISITION</option>
            </select>
        </div>
        <div class="form-control"><label>Target Timestamp</label><input type="datetime-local" id="date" required></div>
        <div class="form-control">
            <label>Transaction Type</label>
            <select id="type"><option value="expense">EXPENSE</option><option value="income">INCOME</option></select>
        </div>
        <button class="btn-add">Execute Record</button>
    </form>

    <div class="history-container">
        <label>LOG CALENDAR (Target Date)</label>
        <input type="date" id="filter-date" onchange="filterTransactions()" style="margin-bottom: 20px; border-color: var(--primary);">
        <ul id="list" class="list"></ul>
        <button class="btn-export" onclick="exportToCSV()">Export Data (CSV)</button>
    </div>
</div>

<script>
    // --- SERVICE WORKER FOR OFFLINE USE ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `
                const cacheName = 'cashflow-v1';
                self.addEventListener('install', e => {
                    e.waitUntil(caches.open(cacheName).then(cache => cache.addAll([location.href])));
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
                });
            `;
            const blob = new Blob([swCode], {type: 'text/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        });
    }

    // --- APP LOGIC ---
    const list = document.getElementById('list');
    const form = document.getElementById('form');
    const progressBar = document.getElementById('progress-bar');
    const viewIndicator = document.getElementById('view-indicator');
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    const catIcons = { "General": "📦", "Food": "🍔", "Salary": "💰", "Transport": "🚗", "Rent": "🏠", "Entertainment": "🎬", "Shopping": "🛍️" };

    function setNow() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('date').value = now.toISOString().slice(0, 16);
    }
    setNow();

    function addTransaction(e) {
        e.preventDefault();
        transactions.push({
            id: Date.now(),
            text: document.getElementById('text').value.toUpperCase(),
            amount: document.getElementById('type').value === 'expense' ? -Math.abs(document.getElementById('amount').value) : Math.abs(document.getElementById('amount').value),
            category: document.getElementById('category').value,
            date: document.getElementById('date').value
        });
        form.reset(); setNow(); filterTransactions();
    }

    function removeTransaction(id) {
        transactions = transactions.filter(t => t.id !== id);
        filterTransactions();
    }

    function updateUI(filtered = transactions, isFiltered = false) {
        list.innerHTML = '';
        let inc = 0, exp = 0;
        viewIndicator.innerText = isFiltered ? `SYSTEM VIEW: DAILY LOG` : `SYSTEM VIEW: ALL-TIME`;
        
        filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(t => {
            const item = document.createElement('li');
            const d = new Date(t.date);
            item.innerHTML = `
                <div class="details">
                    <div class="icon-box">${catIcons[t.category]}</div>
                    <div><span class="date-text">${d.toLocaleDateString()} | ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span><strong>${t.text}</strong></div>
                </div> 
                <div style="display:flex;align-items:center;">
                    <span class="amt" style="color:${t.amount > 0 ? 'var(--income)' : 'var(--expense)'}">${t.amount > 0 ? '+' : ''}${Math.abs(t.amount).toFixed(2)}</span>
                    <button class="delete-btn" onclick="removeTransaction(${t.id})">×</button>
                </div>`;
            list.appendChild(item);
            if(t.amount > 0) inc += t.amount; else exp += Math.abs(t.amount);
        });
        document.getElementById('balance').innerText = `$${(inc - exp).toFixed(2)}`;
        document.getElementById('money-plus').innerText = `+$${inc.toFixed(2)}`;
        document.getElementById('money-minus').innerText = `-$${exp.toFixed(2)}`;
        const ratio = inc > 0 ? (exp / inc) * 100 : (exp > 0 ? 100 : 0);
        progressBar.style.width = Math.min(ratio, 100) + '%';
        localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    function filterTransactions() {
        const d = document.getElementById('filter-date').value;
        updateUI(d ? transactions.filter(t => t.date.startsWith(d)) : transactions, !!d);
    }

    function exportToCSV() {
        let csv = 'Date,Description,Category,Amount\n';
        transactions.forEach(t => { csv += `${t.date},${t.text},${t.category},${t.amount}\n`; });
        const a = document.createElement('a');
        a.href = window.URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        a.download = `CASHFLOW_EXPORT.csv`;
        a.click();
    }

    form.addEventListener('submit', addTransaction);
    updateUI();
</script>
</body>
</html>
